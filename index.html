<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Connexion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <!-- Mode payant section -->
        <div class="mode-payant">
            <h1>Mode payant <span class="question">?</span></h1>
            <button class="btn-change">Changer de mode</button>
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <span class="back">&lt;</span>
            <span class="lite">Lite</span>
        </div>

        <!-- Disclaimer -->
        <div class="disclaimer">
            <p>En continuant, vous acceptez les conditions de votre opérateur Vodacom Congo, y compris le fait que Facebook demande votre numéro de téléphone et le reçoive par ce biais. <a href="#">Modifier les paramètres</a></p>
        </div>

        <!-- Warning -->
        <div class="warning">
            Vous devez d'abord vous connecter.
        </div>

        <!-- Facebook Logo -->
        <div class="facebook-logo">
            <h2>facebook</h2>
        </div>

        <!-- Login Form -->
        <form class="login-form">
            <input type="text" placeholder="Numéro mobile ou e-mail" required>
            <input type="password" placeholder="Mot de passe" required>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <!-- Links -->
        <div class="links">
            <a href="#" class="forgot-password">Mot de passe oublié ?</a>
            <div class="divider">
                <span>ou</span>
            </div>
            <button type="button" class="btn-create">Créer un nouveau compte</button>
        </div>
    </div>
</body>
</html>
